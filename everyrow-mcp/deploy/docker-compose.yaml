services:
  redis:
    image: redis:7.4-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"
    # No ports: — only reachable by other services on the Docker network.
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - backend

  mcp-server:
    build:
      context: ../..
      dockerfile: everyrow-mcp/deploy/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MCP_SERVER_URL: "${MCP_SERVER_URL:?Set MCP_SERVER_URL}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "13"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      EVERYROW_API_URL: "https://futuresearch.ai/api/v0"
      TRUST_PROXY_HEADERS: "${TRUST_PROXY_HEADERS:-false}"
      TRUSTED_IP_HEADER: "${TRUSTED_IP_HEADER:-X-Forwarded-For}"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    driver: bridge
