services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"
    # No ports: — only reachable by other services on the Docker network.
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  mcp-server:
    build:
      context: ../..
      dockerfile: everyrow-mcp/deploy/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MCP_SERVER_URL: "${MCP_SERVER_URL:?Set MCP_SERVER_URL to your cloudflare tunnel URL}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "13"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      EVERYROW_API_URL: "https://everyrow.io/api/v0"
      TRUST_PROXY_HEADERS: "true"  # Behind Cloudflare tunnel
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
