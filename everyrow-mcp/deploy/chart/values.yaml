nameOverride: ""
fullnameOverride: ""

image:
  repository: us-central1-docker.pkg.dev/varuna-400921/delphos/everyrow-mcp
  pullPolicy: IfNotPresent

# Release identifier (tag). The workflow sets this via --set-string releaseId=<sha>
releaseId: "latest"

# OAuth state is stored in Redis. Multiple replicas are possible.
replicaCount: 2

service:
  port: 80
  targetPort: 8000

resources:
  limits:
    cpu: "1000m"
    memory: 2Gi
  requests:
    cpu: "200m"
    memory: 512Mi

env:
  MCP_SERVER_URL: "https://mcp.futuresearch.ai"
  EVERYROW_API_URL: "https://futuresearch.ai/api/v0"
  REDIS_DB: "13"
  SUPABASE_URL: "https://iliivszxpymuffgrwsws.supabase.co"
  REDIS_SENTINEL_ENDPOINTS: "redis.utils.svc.cluster.local:26379"
  REDIS_SENTINEL_MASTER_NAME: "mymaster"
  SENTRY_ENVIRONMENT: "production"

httproute:
  host: mcp.futuresearch.ai
  extraHosts:
    - mcp.everyrow.io

# Session affinity — defense-in-depth for multi-replica deployments.
# The server runs in stateless HTTP mode so affinity is NOT required,
# but it reduces unnecessary cross-pod hops.
sessionAffinity:
  # GCPBackendPolicy: cookie-based affinity at the GKE load-balancer layer.
  gcpBackendPolicy:
    enabled: true
    cookieTtlSec: 3600
  # Service-level ClientIP affinity: kube-proxy layer fallback.
  clientIP:
    enabled: true
    timeoutSeconds: 3600

deployment:
  maxSurge: "50%"
  maxUnavailable: "25%"

secrets:
  enabled: true

# NetworkPolicy: restrict pod ingress/egress.
# gatewayNamespace must match the namespace where gateway data-plane proxy
# pods run — verify with: kubectl get pods -A | grep gateway
#
# redisCIDRs: Production uses Redis Sentinel (cross-namespace/external).
# List every Sentinel + master IP here. Use "kubectl get endpoints" or
# check REDIS_SENTINEL_ENDPOINTS to find the IPs, then narrow the CIDRs.
networkPolicy:
  enabled: false
  gatewayNamespace: gke-managed-system
  redisPort: 6379
  redisSentinelPort: 26379
  redisCIDRs:
    - 10.0.0.0/8       # Pod network
    - 34.118.224.0/20   # GKE service CIDR (covers ClusterIP 34.118.226.16)

tolerations:
  - key: "hyperdiskonly"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: hyperdiskonly
              operator: In
              values:
                - "true"
