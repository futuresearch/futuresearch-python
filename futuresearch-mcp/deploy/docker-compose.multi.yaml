# Multi-replica overlay — adds nginx load balancer, removes host port from mcp-server.
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.local.yaml -f docker-compose.multi.yaml \
#     up -d --scale mcp-server=3
services:
  mcp-server:
    ports: !override []
    command: ["futuresearch-mcp", "--http", "--no-auth", "--port", "8000", "--host", "0.0.0.0"]
    environment:
      ALLOW_NO_AUTH: "1"

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mcp-server
    networks:
      - backend
    restart: unless-stopped
