# Staging overrides — layered on top of values.yaml via:
#   helm upgrade futuresearch-mcp-staging . -n futuresearch-mcp-staging \
#     -f values.yaml \
#     -f values.staging.yaml -f values.secrets.staging.yaml
#
# FUTURESEARCH_API_URL is intentionally not overridden — there is no staging API.
# The MCP server is a frontend to the production FutureSearch API in both environments.

replicaCount: 2

env:
  MCP_SERVER_URL: "https://mcp-staging.everyrow.io"
  REDIS_DB: "14"

httproute:
  host: mcp-staging.everyrow.io
